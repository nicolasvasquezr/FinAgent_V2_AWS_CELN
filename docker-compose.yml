version: "3.9"

services:

  # ── Base de datos PostgreSQL ──────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: finagent_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finagent}
      POSTGRES_USER: ${POSTGRES_USER:-finagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finagent123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ───────────────────────────────────────
  backend:
    build: ./backend
    container_name: finagent_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finagent}:${POSTGRES_PASSWORD:-finagent123}@db:5432/${POSTGRES_DB:-finagent}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  # ── Frontend React (Nginx) ────────────────────────────────
  frontend:
    build: ./frontend
    container_name: finagent_frontend
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
